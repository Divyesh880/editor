<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro Live Editor</title>
    <style>
        body{margin:0;font-family:Consolas,monospace;background:#1e1e1e;color:#fff;display:flex;height:100vh;overflow:hidden;}
        .left{width:50%;display:flex;flex-direction:column;border-right:2px solid #333;min-width:150px;}
        .right{flex:1;display:flex;flex-direction:column;min-width:150px;}
        .resizer{width:6px;background:#444;cursor:col-resize;touch-action:none;}
        .resizer.active{background:#007acc;}
        .editor-header{background:#2d2d2d;padding:8px 15px;font-size:13px;color:#ccc;border-bottom:1px solid #444;display:flex;justify-content:space-between;align-items:center;}
        .editor-wrap{flex:1;display:flex;overflow:hidden;}
        .lines{background:#252526;color:#858585;padding:10px 5px;text-align:right;user-select:none;overflow:hidden;}
        .lines div{height:18px;}
        textarea{flex:1;background:#1e1e1e;color:#fff;border:none;padding:10px;font-size:14px;resize:none;outline:none;line-height:18px;tab-size:2;}
        .toolbar{background:#2d2d2d;padding:10px;display:flex;justify-content:space-between;align-items:center;}
        button{background:#007acc;border:none;color:#fff;padding:6px 12px;cursor:pointer;border-radius:3px;}
        button:hover{background:#005fa3;}
        iframe{flex:1;border:none;background:#fff;}
        #sizeInfo{font-size:12px;opacity:.8;margin-left:10px;}
    </style>
</head>
<body>

    <div class="left" id="leftPanel">
        <div class="editor-header">
            <span>&#128196; index.html</span>
            <span style="font-size:11px;color:#777;">HTML + CSS + JS</span>
        </div>
        <div class="editor-wrap">
            <div class="lines" id="lineNumbers"></div>
            <textarea id="codeEditor" spellcheck="false"></textarea>
        </div>
    </div>

    <div class="resizer" id="dragbar"></div>

    <div class="right" id="rightPanel">
        <div class="toolbar">
            <div>
                <span>Live Preview</span>
                <span id="sizeInfo"></span>
            </div>
            <button onclick="runCode()">Run &#9654;</button>
        </div>
        <iframe id="output"></iframe>
    </div>

    <script>
        const boilerplate='<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Document</title><style>body{font-family:Arial,sans-serif;margin:0;padding:20px}</style></head><body><h1>Hello World</h1><script>console.log("Hello!");<\/script></body></html>';const editor=document.getElementById("codeEditor"),lineNumbers=document.getElementById("lineNumbers");editor.value=boilerplate;function updateLines(){const l=editor.value.split("\n").length;lineNumbers.innerHTML="";for(let i=1;i<=l;i++){const d=document.createElement("div");d.textContent=i;lineNumbers.appendChild(d)}}function runCode(){const code=editor.value,out=document.getElementById("output").contentDocument;out.open();out.write(code);out.close()}editor.addEventListener("input",()=>{updateLines();runCode()});editor.addEventListener("scroll",()=>{lineNumbers.scrollTop=editor.scrollTop});editor.addEventListener("keydown",function(e){if(e.key==="Tab"){e.preventDefault();const s=this.selectionStart,e2=this.selectionEnd;this.value=this.value.substring(0,s)+"  "+this.value.substring(e2);this.selectionStart=this.selectionEnd=s+2;updateLines();runCode()}});function updateSize(){const el=document.getElementById("rightPanel");document.getElementById("sizeInfo").textContent=`${Math.floor(el.clientWidth)}px × ${Math.floor(el.clientHeight)}px`}

        /* Drag to resize */
        const dragbar=document.getElementById("dragbar"),left=document.getElementById("leftPanel");let isDragging=!1,latestX=0,rafId=null;dragbar.addEventListener("pointerdown",e=>{isDragging=!0,dragbar.classList.add("active"),document.body.style.cursor="col-resize",latestX=e.clientX,dragbar.setPointerCapture(e.pointerId)});dragbar.addEventListener("pointermove",e=>{isDragging&&(latestX=e.clientX,rafId||(rafId=requestAnimationFrame(updateLayout)))});dragbar.addEventListener("pointerup",stopDrag);dragbar.addEventListener("pointercancel",stopDrag);function updateLayout(){if(!isDragging)return void(rafId=null);let x=Math.min(Math.max(latestX,328),window.innerWidth-328);left.style.width=x+"px",updateSize(),rafId=requestAnimationFrame(updateLayout)}function stopDrag(){isDragging=!1,dragbar.classList.remove("active"),document.body.style.cursor="default",rafId&&(cancelAnimationFrame(rafId),rafId=null)}updateLines();runCode();updateSize();window.addEventListener("resize",updateSize);
    </script>

</body>
</html>
